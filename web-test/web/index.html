<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#111111" />
    <title>REHAB-AI Pose Test</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>REHAB-AI Pose Test</h1>
        <p id="status">Loading…</p>
      </header>

      <section class="camera-card">
        <div id="cameraContainer" class="camera-container mirror">
          <video id="camera" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
      </section>

      <section class="controls">
        <button id="startButton" type="button">Start camera</button>
        <button id="stopButton" type="button" disabled>Stop</button>
        <button id="resetButton" type="button">Reset reps</button>
        <button id="modelSwitchButton" type="button">
          Switch to Heavy
        </button>
      </section>

      <section class="metrics" aria-live="polite">
        <div><span>Model</span><strong id="currentModel">Lite</strong></div>
        <div><span>Pose</span><strong id="poseState">—</strong></div>
        <div><span>Phase</span><strong id="phase">standing</strong></div>
        <div><span>Reps</span><strong id="repCount">0</strong></div>
        <div><span>Left knee</span><strong id="leftKnee">—</strong></div>
        <div><span>Right knee</span><strong id="rightKnee">—</strong></div>
        <div><span>Latency</span><strong id="latency">—</strong></div>
        <div><span>FPS</span><strong id="fps">—</strong></div>
      </section>

      <section class="notes">
        <p>
          This test runs the Pose Landmarker locally in the browser on the
          device CPU. No video upload is implemented in this prototype.
        </p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
